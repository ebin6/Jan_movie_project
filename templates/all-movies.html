<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <nav>
        <a href="{% url 'movies:home' %}">Home</a>
        <a href="{% url 'movies:add_movie' %}">Add Movie</a>
        <a href="{% url 'movies:all_movies' %}">All Movies</a>
    </nav>
    <h1>All Movies</h1>
    <div>
        {% for movie in movies %}
            <div>
                <img src="{{movie.poster.url}}" style="width: 200px;height: 250px;">
                <h4>{{movie.name}}</h4>
                <a href="{% url 'movies:edit_movie' movie.id %}">Edit</a>
            </div>
        {% endfor %}
    </div>
</body>
</html>
