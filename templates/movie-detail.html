<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>{{movie.name}}</h1>
    <div>
        <img src="{{movie.poster.url}}" style="width: 200px;height: 250px;">
    </div>
    <div>
        <p>Release Date : {{movie.release_date}}</p>
    </div>
    <p>{{movie.description}}</p>
    <p><a href="{{movie.trailer_link}}">Trailer link</a></p>
    <p>{{movie.category.name}}</p>
</body>
</html>
