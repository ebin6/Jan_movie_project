{% extends 'base.html ' %}

{% block title %}Edit - {{movie.name}}{% endblock %}

{% block content %}
    <div>
        <h1>Edit Movie</h1>
    </div>

    <div style="display: flex;">
        <div>
            <img src="{{movie.poster.url}}" style="width: 250px;height: 300px;">
        </div>
        <div>
            <form method="post" action="" enctype="multipart/form-data">
                {% csrf_token %}
                <div>
                    <label>Movie Name</label>
                    <input type="text" name="title" value="{{movie.name}}">
                </div>
                <div>
                    <label>Description</label>
                    <textarea name="description">{{movie.description}}</textarea>
                </div>
                <div>
                    <label>Trailer link</label>
                    <input type="text" name="trailer_link" value="{{movie.trailer_link}}">
                </div>
                <div>
                    <label>Poster</label>
                    <input type="file" name="poster">
                </div>
                <div>
                    <label>Category</label>
                    <select name="category">
                        {% for cat in categories %}
                            <option value="{{cat.id}}">{{cat.name}}</option>
                        {% endfor %}
                    </select>
                </div>
                <div>
                    <label>Release date</label>
                    <input type="date" name="release_date" value="{{movie.release_date|date:'Y-m-d'}}">
                </div>
                <div>
                    <input type="submit" value="Save Changes">
                </div>
        
            </form>
        </div>
    </div>
    
    
{% endblock %}
